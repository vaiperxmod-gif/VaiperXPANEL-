<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaiperX PANELAIM</title>
    
    <link rel="apple-touch-icon" href="https://img5.pic.in.th/file/secure-sv1/87C76E66-5A35-4C58-A93D-FC902CF01AD6.jpeg">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff3b3b;
            --glow-red: rgba(255, 59, 59, 0.6);
            --bg-dark: #050505;
            --glass: rgba(15, 15, 15, 0.85);
        }

        body {
            background: radial-gradient(circle, #220000 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            color: white;
            user-select: none;
            /* ป้องกันการกดค้างแล้วขึ้นเมนูบน iOS */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }

        .window {
            width: 580px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary-red);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(255, 0, 0, 0.15);
        }

        .title-bar {
            background: rgba(255, 59, 59, 0.15);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title-text {
            font-size: 13px;
            letter-spacing: 1.5px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--primary-red);
        }

        .main-container {
            display: flex;
            height: 360px;
        }

        .sidebar {
            width: 135px;
            background: rgba(0, 0, 0, 0.3);
            padding-top: 25px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }

        .profile-img {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            border: 2px solid var(--primary-red);
            object-fit: cover;
            box-shadow: 0 0 20px var(--glow-red);
            transition: 0.3s;
        }

        .shop-name {
            font-size: 11px;
            margin-top: 12px;
            color: #ff3b3b;
            font-weight: 900;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        .nav-item {
            width: 100%;
            padding: 14px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: #555;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            color: white;
            background: linear-gradient(90deg, rgba(255, 59, 59, 0.2) 0%, transparent 100%);
            border-left: 4px solid var(--primary-red);
        }

        .content-section {
            display: none;
            flex: 1;
            padding: 25px;
            animation: fadeIn 0.4s ease;
        }

        .content-section.active { display: flex; justify-content: space-between; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .controls-group { width: 55%; }

        .sub-title {
            font-size: 10px;
            color: #666;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: 2px;
            border-left: 2px solid var(--primary-red);
            padding-left: 8px;
        }

        .switch-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .switch {
            position: relative;
            width: 40px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary-red); box-shadow: 0 0 12px var(--glow-red); }
        input:checked + .slider:before { transform: translateX(20px); }

        .character-box {
            width: 160px;
            height: 260px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            border: 1px solid rgba(255, 59, 59, 0.4);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .character-img { height: 90%; transition: 0.5s; z-index: 1; }

        .target-glow {
            position: absolute;
            top: 35px;
            width: 35px;
            height: 35px;
            border: 2px solid var(--primary-red);
            border-radius: 50%;
            display: none;
            z-index: 2;
            box-shadow: 0 0 20px red;
            animation: scan 1.5s infinite;
        }

        @keyframes scan {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div class="title-text">
            <i class="fa-solid fa-v" style="color: var(--primary-red);"></i> VaiperX PANELAIM
        </div>
        <div style="color: #666; font-size: 14px;">
            <i class="fa-solid fa-minus" style="margin-right:15px;"></i>
            <i class="fa-solid fa-xmark"></i>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="profile-section">
                <img src="https://img5.pic.in.th/file/secure-sv1/87C76E66-5A35-4C58-A93D-FC902CF01AD6.jpeg" class="profile-img">
                <div class="shop-name">@Vaiperx</div>
            </div>
            
            <div class="nav-item active" onclick="showTab('aimTab')">
                <i class="fa-solid fa-crosshairs"></i> Aim Assist
            </div>
            <div class="nav-item" onclick="showTab('banTab')">
                <i class="fa-solid fa-shield-virus"></i> Anti-Ban
            </div>
            <div class="nav-item" onclick="showTab('fpsTab')">
                <i class="fa-solid fa-bolt"></i> Boost FPS
            </div>
        </div>

        <div id="aimTab" class="content-section active">
            <div class="controls-group">
                <div class="sub-title">AIM ASSIST CONFIG</div>
                <div class="switch-wrapper">
                    <span>ดูดหัวอัตโนมัติ</span>
                    <label class="switch"><input type="checkbox" id="headshot"><span class="slider"></span></label>
                </div>
                <div class="switch-wrapper">
                    <span>ช่วยลากขึ้นหัว</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="switch-wrapper">
                    <span>เป้าดูดติดตัว</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="switch-wrapper">
                    <span>ลดแรงดีด</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
            </div>

            <div class="character-box">
                <div class="target-glow" id="target"></div>
                <img src="https://img5.pic.in.th/file/secure-sv1/8D355855-2310-421D-9D1C-69A9FCC12649.png" class="character-img" id="char">
            </div>
        </div>

        <div id="banTab" class="content-section">
            <div class="controls-group">
                <div class="sub-title">SECURITY SYSTEM</div>
                <div class="switch-wrapper">
                    <span>Bypass Anticheat</span>
                    <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                </div>
                <div class="switch-wrapper">
                    <span>Clean Log Files</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
            </div>
        </div>

        <div id="fpsTab" class="content-section">
            <div class="controls-group">
                <div class="sub-title">PERFORMANCE BOOST</div>
                <div class="switch-wrapper">
                    <span>Unlock 90 FPS</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="switch-wrapper">
                    <span>Clear Memory</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function showTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    const hsBtn = document.getElementById('headshot');
    const target = document.getElementById('target');
    const charImg = document.getElementById('char');

    hsBtn.addEventListener('change', function() {
        if (this.checked) {
            target.style.display = 'block';
            charImg.style.filter = 'drop-shadow(0 0 15px red) brightness(1.2)';
        } else {
            target.style.display = 'none';
            charImg.style.filter = 'none';
        }
    });
</script>

</body>
</html>
