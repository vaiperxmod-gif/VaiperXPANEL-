<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VaiperX PANELAIM</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VaiperX">
    <link rel="apple-touch-icon" href="https://img5.pic.in.th/file/secure-sv1/87C76E66-5A35-4C58-A93D-FC902CF01AD6.jpeg">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff3b3b;
            --glow-red: rgba(255, 59, 59, 0.6);
            --bg-dark: #050505;
            --glass: rgba(15, 15, 15, 0.9);
        }

        body {
            background: radial-gradient(circle, #220000 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: white;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* ปรับขนาดหน้าต่างให้เล็กลง (Compact Mode) */
        .window {
            width: 340px; 
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary-red);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .title-bar {
            background: rgba(255, 59, 59, 0.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title-text {
            font-size: 11px;
            letter-spacing: 1px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .main-container {
            display: flex;
            height: 280px; /* ลดความสูงลง */
        }

        /* Sidebar ขนาดกะทัดรัด */
        .sidebar {
            width: 90px;
            background: rgba(0, 0, 0, 0.3);
            padding-top: 15px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 1.5px solid var(--primary-red);
            object-fit: cover;
            box-shadow: 0 0 10px var(--glow-red);
        }

        .shop-name {
            font-size: 9px;
            margin-top: 8px;
            color: var(--primary-red);
            font-weight: bold;
        }

        .nav-item {
            width: 100%;
            padding: 12px 0;
            display: flex;
            flex-direction: column; /* ไอคอนบน ข้อความล่าง */
            align-items: center;
            gap: 4px;
            color: #555;
            font-size: 9px;
            cursor: pointer;
        }

        .nav-item i { font-size: 14px; }

        .nav-item.active {
            color: white;
            background: rgba(255, 59, 59, 0.1);
            border-left: 3px solid var(--primary-red);
        }

        /* Content Area */
        .content-section {
            display: none;
            flex: 1;
            padding: 15px;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .content-section.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .sub-title {
            font-size: 9px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .switch-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 10px;
            border-radius: 6px;
            margin-bottom: 5px;
            font-size: 11px;
        }

        /* ปุ่ม Switch ขนาดเล็กลง */
        .switch {
            position: relative;
            width: 34px;
            height: 18px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222;
            transition: .3s;
            border-radius: 18px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px; width: 12px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary-red); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* กล่องตัวละครย่อขนาด */
        .character-box {
            margin-top: 10px;
            height: 100px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border: 1px solid rgba(255, 59, 59, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .character-img { height: 90%; transition: 0.3s; }
        
        .target-glow {
            position: absolute;
            top: 15px;
            width: 20px; height: 20px;
            border: 1.5px solid var(--primary-red);
            border-radius: 50%;
            display: none;
            box-shadow: 0 0 10px red;
        }

    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div class="title-text">VaiperX PANELAIM</div>
        <div style="color: #444; font-size: 12px;">
            <i class="fa-solid fa-minus" style="margin-right:10px;"></i>
            <i class="fa-solid fa-xmark"></i>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <img src="https://img5.pic.in.th/file/secure-sv1/87C76E66-5A35-4C58-A93D-FC902CF01AD6.jpeg" class="profile-img">
            <div class="shop-name">@Vaiperx</div>
            
            <div class="nav-item active" onclick="showTab('aimTab')">
                <i class="fa-solid fa-crosshairs"></i> Aim
            </div>
            <div class="nav-item" onclick="showTab('banTab')">
                <i class="fa-solid fa-shield"></i> Security
            </div>
            <div class="nav-item" onclick="showTab('fpsTab')">
                <i class="fa-solid fa-bolt"></i> FPS
            </div>
        </div>

        <div id="aimTab" class="content-section active">
            <div class="sub-title">Aim Config</div>
            <div class="switch-wrapper">
                <span>ดูดหัว</span>
                <label class="switch"><input type="checkbox" id="headshot"><span class="slider"></span></label>
            </div>
            <div class="switch-wrapper">
                <span>ช่วยลาก</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
            <div class="switch-wrapper">
                <span>ลดแรงดีด</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
            
            <div class="character-box">
                <div class="target-glow" id="target"></div>
                <img src="https://img5.pic.in.th/file/secure-sv1/8D355855-2310-421D-9D1C-69A9FCC12649.png" class="character-img" id="char">
            </div>
        </div>

        <div id="banTab" class="content-section">
            <div class="sub-title">Security</div>
            <div class="switch-wrapper">
                <span>Bypass</span>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
            <div class="switch-wrapper">
                <span>Clean Logs</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
        </div>

        <div id="fpsTab" class="content-section">
            <div class="sub-title">Performance</div>
            <div class="switch-wrapper">
                <span>Boost 90 FPS</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
        </div>
    </div>
</div>

<script>
    function showTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    const hsBtn = document.getElementById('headshot');
    const target = document.getElementById('target');
    const charImg = document.getElementById('char');

    hsBtn.addEventListener('change', function() {
        if (this.checked) {
            target.style.display = 'block';
            charImg.style.filter = 'drop-shadow(0 0 10px red) brightness(1.1)';
        } else {
            target.style.display = 'none';
            charImg.style.filter = 'none';
        }
    });
</script>

</body>
</html>
