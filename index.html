<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://i.postimg.cc/NMPkYTdZ/87C76E66-5A35-4C58-A93D-FC902CF01AD6.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/NMPkYTdZ/87C76E66-5A35-4C58-A93D-FC902CF01AD6.jpg">
    
    <title>VaiperXmod - Supreme Menu</title>
    <style>
        :root {
            --primary: #ff0000;
            --bg-dark: #050505;
            --glow: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        /* --- 1. หน้า Loading Screen --- */
        #pre-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 1s ease;
        }
        .loader-logo {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--primary); box-shadow: var(--glow);
            margin-bottom: 20px; animation: pulse-logo 2s infinite;
        }
        @keyframes pulse-logo {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .load-bar { width: 250px; height: 4px; background: #222; border-radius: 10px; overflow: hidden; }
        .load-fill { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 10px red; animation: fill-bar 3s forwards; }
        @keyframes fill-bar { to { width: 100%; } }

        /* --- 2. Background ดาวตก --- */
        .star-container { position: absolute; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: linear-gradient(90deg, white, transparent); height: 1px; animation: shoot 4s linear infinite; opacity: 0; }
        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; width: 0; }
            10% { opacity: 0.8; width: 120px; }
            100% { transform: translateX(800px) translateY(800px) rotate(-45deg); opacity: 0; width: 0; }
        }

        /* --- 3. UI Main Container --- */
        .container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 850px; z-index: 10; background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 0, 0, 0.4);
            border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,1), var(--glow);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .header { background: linear-gradient(90deg, #d32f2f, #300); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }

        .main-content { display: flex; height: 500px; }

        /* Sidebar */
        .sidebar { width: 200px; background: rgba(5, 5, 5, 0.9); border-right: 1px solid rgba(255, 0, 0, 0.2); display: flex; flex-direction: column; padding: 30px 0; }
        .avatar-ring { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: var(--glow); overflow: hidden; margin: 0 auto 10px auto; }
        .avatar-ring img { width: 100%; height: 100%; object-fit: cover; }
        .nav-btn { padding: 18px 25px; cursor: pointer; transition: 0.3s; font-size: 14px; color: #777; display: flex; align-items: center; gap: 15px; }
        .nav-btn:hover, .nav-btn.active { color: white; background: rgba(255, 0, 0, 0.15); border-left: 5px solid var(--primary); }

        /* Tab Content */
        .tab-content { flex: 1; padding: 35px; display: none; overflow-y: auto; }
        .tab-content.active { display: block; }
        .group-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 16px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

        /* Switch */
        .switch { position: relative; width: 48px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #222; transition: 0.4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: 0.4s; border-radius: 50%; }
        input:checked + .slider { background: var(--primary); box-shadow: var(--glow); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Preview Right */
        .preview-pane { width: 250px; margin: 20px; background: #000; border-radius: 15px; border: 1px solid rgba(255, 0, 0, 0.2); position: relative; overflow: hidden; }
        .char-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .red-ef { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.3s; filter: sepia(100%) saturate(8000%) hue-rotate(330deg) brightness(1.2) drop-shadow(0 0 15px red); pointer-events: none; }
        .head-z { clip-path: inset(0% 0% 83% 0%); }
        .body-z { clip-path: inset(17% 0% 0% 0%); }
        .active-red { opacity: 1 !important; }

        /* Start Game */
        .start-btn { position: absolute; bottom: 30px; right: 40px; background: linear-gradient(45deg, #ff0000, #990000); border: none; color: white; padding: 15px 40px; font-size: 18px; font-weight: 900; border-radius: 50px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px rgba(255,0,0,0.5); }
        
        /* Injecting Screen */
        #inject-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 11000; display: none; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="pre-loader">
        <img src="https://i.postimg.cc/NMPkYTdZ/87C76E66-5A35-4C58-A93D-FC902CF01AD6.jpg" class="loader-logo">
        <div style="font-size: 24px; font-weight: bold; letter-spacing: 5px; margin-bottom: 5px;">VaiperXmod</div>
        <div style="color: red; font-size: 14px; margin-bottom: 30px; font-weight: bold;">Created by Vaiperx</div>
        <div class="load-bar"><div class="load-fill"></div></div>
    </div>

    <div id="inject-screen">
        <h2 style="color: red;">INJECTING...</h2>
        <div class="load-bar"><div id="inj-bar" style="width: 0%; height: 100%; background: red;"></div></div>
    </div>

    <div class="star-container" id="stars"></div>

    <div class="container">
        <div class="header"><span>VAIPERXMOD // SUPREME MENU</span><div>✕</div></div>
        <div class="main-content">
            <div class="sidebar">
                <div class="avatar-ring"><img src="https://i.postimg.cc/NMPkYTdZ/87C76E66-5A35-4C58-A93D-FC902CF01AD6.jpg"></div>
                <p style="text-align:center; color:red; font-size:12px; font-weight:bold;">VaiperXmod</p>
                <div class="nav-btn active" onclick="tab('aim', this)">🎯 AIMBOT</div>
                <div class="nav-btn" onclick="tab('anti', this)">🛡️ ANTI-BAN</div>
                <div class="nav-btn" onclick="tab('fps', this)">⚡ BOOST FPS</div>
            </div>

            <div id="aim" class="tab-content active">
                <div class="group-card"><span>ดูดหัว (Head-Lock)</span><label class="switch"><input type="checkbox" id="h-sw" onchange="run()"><span class="slider"></span></label></div>
                <div class="group-card"><span>เป้าดูดง่าย (Soft Aim)</span><label class="switch"><input type="checkbox" id="b-sw" onchange="run()"><span class="slider"></span></label></div>
                <div class="group-card"><span>ช่วยลากหัว (Auto Drag)</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="group-card"><span>ปิดทำงาน (Reset)</span><label class="switch"><input type="checkbox" id="off-sw" onchange="run()"><span class="slider"></span></label></div>
            </div>

            <div id="anti" class="tab-content">
                <div class="group-card"><span>กันดำ (Anti-Blacklist)</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="group-card"><span>กันแบนถาวร</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="group-card"><span>หันรีพอร์ต (Anti-Report)</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            </div>

            <div id="fps" class="tab-content">
                <div class="group-card"><span>Unlock 90 FPS</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="group-card"><span>ลดความร้อน (Cooling)</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            </div>

            <div class="preview-pane">
                <img class="char-img" src="https://i.postimg.cc/cHQtknVQ/8D355855-2310-421D-9D1C-69A9FCC12649.png">
                <img id="h-ef" class="red-ef head-z" src="https://i.postimg.cc/cHQtknVQ/8D355855-2310-421D-9D1C-69A9FCC12649.png">
                <img id="b-ef" class="red-ef body-z" src="https://i.postimg.cc/cHQtknVQ/8D355855-2310-421D-9D1C-69A9FCC12649.png">
            </div>
        </div>
        <button class="start-btn" onclick="startGame()">Start Free Fire</button>
    </div>

    <script>
        // ปิดหน้าโหลด
        window.addEventListener('load', () => { setTimeout(() => { document.getElementById('pre-loader').style.opacity = '0'; setTimeout(() => document.getElementById('pre-loader').style.display = 'none', 1000); }, 3500); });

        // สร้างดาวตก
        function createStars() { const sb = document.getElementById('stars'); for(let i=0; i<20; i++) { let s = document.createElement('div'); s.className = 'star'; s.style.top = Math.random()*100+"%"; s.style.left = Math.random()*100+"%"; s.style.animationDelay = Math.random()*5+"s"; sb.appendChild(s); } } createStars();

        function tab(id, el) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }

        function run() { const h = document.getElementById('h-sw').checked, b = document.getElementById('b-sw').checked, off = document.getElementById('off-sw').checked; const h_el = document.getElementById('h-ef'), b_el = document.getElementById('b-ef'); h_el.classList.remove('active-red'); b_el.classList.remove('active-red'); if(off) { document.querySelectorAll('input[type="checkbox"]').forEach(i => i.checked = false); return; } if(h) h_el.classList.add('active-red'); if(b) b_el.classList.add('active-red'); }

        function startGame() { const inj = document.getElementById('inject-screen'), bar = document.getElementById('inj-bar'); inj.style.display = 'flex'; let p = 0; const t = setInterval(() => { p += 5; bar.style.width = p + "%"; if(p >= 100) { clearInterval(t); window.location.href = "com.dts.freefireth://"; setTimeout(() => inj.style.display = 'none', 2000); } }, 100); }
    </script>
</body>
</html>
