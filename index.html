<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- ส่วนสำหรับตั้งค่าไอคอนหน้าจอหลัก iOS (Web App) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="VaiperX V4">
    
    <!-- ลิงก์รูปภาพไอคอนที่คุณส่งมา -->
    <link rel="apple-touch-icon" href="https://img1.pic.in.th/images/65D46937-0C7C-4F61-AEFF-B24F49EBC1D7.png">
    <link rel="icon" type="image/png" href="https://img1.pic.in.th/images/65D46937-0C7C-4F61-AEFF-B24F49EBC1D7.png">

    <title>VaiperX WIN100 V4 - MAX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #ff0033;
            --primary-glow: rgba(255, 0, 51, 0.8);
            --online-green: #00ff66;
            --bg-overlay: rgba(0, 0, 0, 0.85); 
        }

        /* ป้องกันการคลุมดำ/เลือกข้อความ */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0; background: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; color: #fff; overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .panel {
            width: 100%; height: 100%;
            max-width: 500px; max-height: 850px;
            position: relative;
            background-image: url('https://i.postimg.cc/sgs4jq5J/87C76E66-5A35-4C58-A93D-FC902CF01AD6.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid #222;
        }

        @media (min-width: 500px) {
            .panel { border-radius: 30px; height: 90vh; box-shadow: 0 0 50px #000, 0 0 25px var(--primary-glow); }
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay); z-index: 1;
        }

        .container { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100%; }

        .app-header {
            padding: 30px 20px 15px; text-align: center;
            background: rgba(0,0,0,0.6); border-bottom: 1px solid rgba(255, 0, 51, 0.4);
        }
        .app-header h1 { margin: 0; font-size: 24px; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 15px var(--primary); }
        .app-header span { font-size: 11px; color: var(--primary); text-transform: uppercase; font-weight: bold; }

        .nav { display: flex; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); }
        .nav-btn {
            flex: 1; padding: 18px 0; border: none; background: none;
            color: #555; cursor: pointer; transition: 0.3s;
            font-size: 10px; font-weight: bold; display: flex;
            flex-direction: column; align-items: center; gap: 8px;
        }
        .nav-btn i { font-size: 22px; }
        .nav-btn.active { 
            color: var(--primary); text-shadow: 0 0 15px var(--primary); 
            background: rgba(255,0,0,0.1); border-bottom: 3px solid var(--primary);
        }

        .content { flex: 1; padding: 20px; overflow-y: auto; scrollbar-width: none; padding-bottom: 100px; }
        .content::-webkit-scrollbar { display: none; }
        .tab-page { display: none; animation: fadeIn 0.4s ease; }
        .tab-page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item {
            background: rgba(255, 255, 255, 0.06); padding: 16px;
            border-radius: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px);
        }
        .item-label { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .item-label i { color: var(--primary); font-size: 18px; width: 22px; text-align: center; }

        .active-tag { color: var(--primary); font-weight: bold; font-size: 9px; display: none; margin-right: 10px; text-shadow: 0 0 5px var(--primary); }

        .switch {
            width: 46px; height: 24px; background: #333; border-radius: 20px;
            position: relative; cursor: pointer; transition: 0.3s; border: 1px solid #444;
        }
        .switch.on { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .switch::after {
            content: ''; position: absolute; width: 18px; height: 18px;
            background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s;
        }
        .switch.on::after { left: 24px; }

        .slider-box {
            background: rgba(255, 255, 255, 0.05); padding: 16px;
            border-radius: 15px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .slider-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 12px; color: #aaa; }
        input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; height: 6px; }

        .footer {
            padding: 15px 25px; background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 0, 51, 0.4);
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .status-badge {
            padding: 6px 18px; border-radius: 20px; font-size: 11px; font-weight: bold;
            border: 1px solid var(--primary); color: var(--primary); transition: 0.5s;
        }
        .status-badge.online { color: var(--online-green); border-color: var(--online-green); text-shadow: 0 0 10px var(--online-green); }

        .start-btn {
            width: 100%; padding: 20px; background: var(--primary); 
            color: white; border: none; border-radius: 18px; 
            font-size: 20px; font-weight: 900; cursor: pointer; margin-top: 10px;
            box-shadow: 0 5px 25px rgba(255, 0, 51, 0.5);
            text-transform: uppercase; letter-spacing: 3px;
            transition: 0.3s;
        }
        .start-btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- บล็อกคลิกขวา -->

<div class="panel">
    <div class="overlay"></div>
    <div class="container">
        
        <header class="app-header">
            <h1>VAIPERX MAX</h1>
            <span>ULTIMATE HITBOX EDITION</span>
        </header>

        <div class="nav">
            <button class="nav-btn active" onclick="showTab(event, 'aim')">
                <i class="fas fa-crosshairs"></i> AIM ASSIST
            </button>
            <button class="nav-btn" onclick="showTab(event, 'ban')">
                <i class="fas fa-shield-halved"></i> PROTECTION
            </button>
            <button class="nav-btn" onclick="showTab(event, 'fps')">
                <i class="fas fa-microchip"></i> SYSTEM
            </button>
        </div>

        <div class="content">
            <div id="aim" class="tab-page active">
                <div class="item">
                    <div class="item-label"><i class="fas fa-magnet"></i> ระบบดูดหัว (Magnet)</div>
                    <div style="display:flex; align-items:center;">
                        <span class="active-tag">ACTIVE</span>
                        <div class="switch" onclick="toggleSwitch(this)"></div>
                    </div>
                </div>
                <div class="item">
                    <div class="item-label"><i class="fas fa-expand-arrows-alt"></i> ขยายหัว (Hitbox Max)</div>
                    <div style="display:flex; align-items:center;">
                        <span class="active-tag">ACTIVE</span>
                        <div class="switch" onclick="toggleSwitch(this)"></div>
                    </div>
                </div>
                <div class="item">
                    <div class="item-label"><i class="fas fa-bullseye"></i> เป้าติดตาม (Sticky Aim)</div>
                    <div style="display:flex; align-items:center;">
                        <span class="active-tag">ACTIVE</span>
                        <div class="switch" onclick="toggleSwitch(this)"></div>
                    </div>
                </div>
                <div class="item">
                    <div class="item-label"><i class="fas fa-wand-magic-sparkles"></i> ลดแรงดีด (No Shake)</div>
                    <div style="display:flex; align-items:center;">
                        <span class="active-tag">ACTIVE</span>
                        <div class="switch" onclick="toggleSwitch(this)"></div>
                    </div>
                </div>
                
                <div class="slider-box">
                    <div class="slider-header"><span>Pull Power</span><span class="val">85%</span></div>
                    <input type="range" value="85" oninput="this.previousElementSibling.querySelector('.val').innerText=this.value+'%'">
                </div>
            </div>

            <div id="ban" class="tab-page">
                <div class="item">
                    <div class="item-label"><i class="fas fa-user-ninja"></i> Anti-Report</div>
                    <div class="switch" onclick="toggleSwitch(this)"></div>
                </div>
                <div class="item">
                    <div class="item-label"><i class="fas fa-mask"></i> Anti-Blacklist</div>
                    <div class="switch" onclick="toggleSwitch(this)"></div>
                </div>
                <div class="item">
                    <div class="item-label"><i class="fas fa-shield-cat"></i> Bypass Security</div>
                    <div class="switch" onclick="toggleSwitch(this)"></div>
                </div>
                <div class="item">
                    <div class="item-label"><i class="fas fa-eraser"></i> Clear Game Logs</div>
                    <div class="switch" onclick="toggleSwitch(this)"></div>
                </div>
            </div>

            <div id="fps" class="tab-page">
                <div class="item">
                    <div class="item-label"><i class="fas fa-bolt"></i> Unlock 90 FPS</div>
                    <div class="switch" onclick="toggleSwitch(this)"></div>
                </div>
                <div class="item">
                    <div class="item-label"><i class="fas fa-gauge-high"></i> CPU Optimizer</div>
                    <div class="switch" onclick="toggleSwitch(this)"></div>
                </div>
                <div class="item">
                    <div class="item-label"><i class="fas fa-wifi"></i> Ping Stabilizer</div>
                    <div class="switch" onclick="toggleSwitch(this)"></div>
                </div>
                <button class="start-btn" onclick="startGame()">START FREE FIRE MAX</button>
            </div>
        </div>

        <footer class="footer">
            <div style="font-size: 11px; color: #777;">CREDIT: <b style="color:#fff;">VaiperXWIN100</b></div>
            <div id="status-badge" class="status-badge">OFFLINE</div>
        </footer>
    </div>
</div>

<script>
    // --- 1. ระบบป้องกันการส่องโค้ด (Anti-Inspect) ---
    document.onkeydown = function(e) {
        if (e.keyCode == 123) return false; // F12
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) return false; // I, J
        if (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83)) return false; // U, S
    };

    // กับดัก Debugger
    setInterval(function(){ (function(){ return false; }["constructor"]("debugger")["call"]()); }, 1000);

    // --- 2. ฟังก์ชันแอป ---
    let activeFunctions = 0;

    function showTab(evt, tabName) {
        const pages = document.querySelectorAll(".tab-page");
        const btns = document.querySelectorAll(".nav-btn");
        pages.forEach(p => p.classList.remove("active"));
        btns.forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function toggleSwitch(el) {
        const tag = el.previousElementSibling;
        el.classList.toggle('on');
        if (el.classList.contains('on')) {
            if (tag) tag.style.display = "block";
            activeFunctions++;
            if(navigator.vibrate) navigator.vibrate(40);
        } else {
            if (tag) tag.style.display = "none";
            activeFunctions--;
        }
        updateStatus();
    }

    function updateStatus() {
        const badge = document.getElementById('status-badge');
        badge.innerText = activeFunctions > 0 ? "ONLINE" : "OFFLINE";
        activeFunctions > 0 ? badge.classList.add("online") : badge.classList.remove("online");
    }

    function startGame() {
        const badge = document.getElementById('status-badge');
        badge.innerText = "LAUNCHING...";
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        setTimeout(() => {
            window.location.href = "freefiremax://";
            setTimeout(() => { if (document.hasFocus()) window.location.href = "freefire://"; }, 500);
            badge.innerText = "ONLINE";
        }, 1200);
    }
</script>

</body>
</html>
